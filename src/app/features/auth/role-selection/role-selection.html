<div class="min-h-screen bg-gradient-to-br from-blue-950 via-blue-900 to-indigo-900 flex items-center justify-center p-4">

  <div class="relative w-full max-w-lg fade-in">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white/10 backdrop-blur mb-4 border border-white/20">
        <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Select Your Role</h1>
      <p class="text-blue-200 text-sm mt-1">
        Welcome, <strong class="text-white">{{ currentUser()?.userName }}</strong>. Choose your role to continue.
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <div class="space-y-3 mb-6">
        @for (role of roles(); track role.RoleID) {
          <button
            (click)="selectRole(role)"
            class="w-full flex items-center gap-4 p-4 rounded-xl border-2 transition-all duration-200 text-left"
            [class.border-blue-500]="selectedRole()?.RoleID === role.RoleID"
            [class.bg-blue-50]="selectedRole()?.RoleID === role.RoleID"
            [class.border-gray-200]="selectedRole()?.RoleID !== role.RoleID"
            [class.hover:border-gray-300]="selectedRole()?.RoleID !== role.RoleID"
            [class.hover:bg-gray-50]="selectedRole()?.RoleID !== role.RoleID">

            <div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center"
              [class.bg-blue-100]="selectedRole()?.RoleID === role.RoleID"
              [class.bg-gray-100]="selectedRole()?.RoleID !== role.RoleID">
              <svg class="w-5 h-5"
                [class.text-blue-600]="selectedRole()?.RoleID === role.RoleID"
                [class.text-gray-500]="selectedRole()?.RoleID !== role.RoleID"
                fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="roleIcons[role.RoleName] || roleIcons['Agent']" />
              </svg>
            </div>

            <div class="flex-1">
              <p class="font-semibold text-gray-900 text-sm">{{ role.RoleName }}</p>
              <p class="text-xs text-gray-500">{{ role.ServiceName }}</p>
            </div>

            @if (selectedRole()?.RoleID === role.RoleID) {
              <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
              </svg>
            }
          </button>
        }
      </div>

      <div class="flex gap-3">
        <button (click)="logout()"
          class="flex-1 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition text-sm">
          Sign Out
        </button>
        <button (click)="proceed()"
          [disabled]="!selectedRole()"
          class="flex-1 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-medium rounded-lg transition text-sm">
          Continue to Dashboard
        </button>
      </div>
    </div>
  </div>
</div>
